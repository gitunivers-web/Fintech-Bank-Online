kind = "web"
previewPath = "/"
title = "NeoBank - Online Banking"
version = "1.0.0"
id = "artifacts/neobank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22140

[services.development]
run = "pnpm --filter @workspace/neobank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neobank", "run", "build" ]
publicDir = "artifacts/neobank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22140"
BASE_PATH = "/"
